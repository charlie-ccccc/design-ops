<svg xmlns="http://www.w3.org/2000/svg" width="480" height="160" viewBox="0 0 480 160">
  <rect width="480" height="160" fill="#FAFAF7"/>
  <!-- KPI Card (left) -->
  <rect x="20" y="20" width="180" height="120" rx="9" fill="#FFFFFF" stroke="#DEDBD4" stroke-width="1"/>
  <text x="36" y="46" font-family="sans-serif" font-size="10" fill="#6B6864" letter-spacing="0.08em">本月工時</text>
  <text x="36" y="90" font-family="sans-serif" font-size="32" font-weight="600" fill="#1A1A17" letter-spacing="-0.02em">128</text>
  <text x="100" y="90" font-family="sans-serif" font-size="13" fill="#9A9893">H</text>
  <text x="36" y="112" font-family="sans-serif" font-size="11" fill="#5B9B6B">▲ 12H vs last month</text>
  <text x="110" y="148" font-family="sans-serif" font-size="9" fill="#9A9893">KPI Card — surface panel, full border</text>
  <!-- Donut Center Lockup (right) -->
  <circle cx="360" cy="80" r="56" fill="none" stroke="#E0DEDA" stroke-width="12"/>
